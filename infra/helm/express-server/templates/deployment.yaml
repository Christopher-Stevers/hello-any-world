apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.nameOverride }}
  labels:
    app: {{ .Values.nameOverride }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.nameOverride }}
  template:
    metadata:
      labels:
        app: {{ .Values.nameOverride }}
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"

          {{- if .Values.envFile.enabled }}
          volumeMounts:
            {{- if .Values.envFile.config }}
            - name: envfile-config
              mountPath: {{ .Values.envFile.mountPath }}
              subPath: .env
              readOnly: true
            {{- end }}
            {{- if .Values.envFile.existingSecretName }}
            - name: envfile-existing-secret
              mountPath: {{ .Values.envFile.mountPath }}
              subPath: .env
              readOnly: true
            {{- else if .Values.envFile.secret }}
            - name: envfile-secret
              mountPath: {{ .Values.envFile.mountPath }}
              subPath: .env
              readOnly: true
            {{- end }}
          {{- end }}

      {{- if .Values.envFile.enabled }}
      volumes:
        {{- if .Values.envFile.config }}
        - name: envfile-config
          configMap:
            name: {{ .Values.nameOverride }}-env
        {{- end }}
        {{- if .Values.envFile.existingSecretName }}
        - name: envfile-existing-secret
          secret:
            secretName: {{ .Values.envFile.existingSecretName }}
        {{- else if .Values.envFile.secret }}
        - name: envfile-secret
          secret:
            secretName: {{ .Values.nameOverride }}-env-secret
        {{- end }}
      {{- end }}