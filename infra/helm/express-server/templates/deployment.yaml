apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.nameOverride }}
  labels:
    app: {{ .Values.nameOverride }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.nameOverride }}
  template:
    metadata:
      labels:
        app: {{ .Values.nameOverride }}
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"

          volumeMounts:
            - name: envfile-existing-secret
              mountPath: {{ .Values.envFile.mountPath }}
              subPath: .env
              readOnly: true
            - name: envfile-secret
              mountPath: {{ .Values.envFile.mountPath }}
              subPath: .env
              readOnly: true
            - name: envfile-config
              mountPath: {{ .Values.envFile.mountPath }}
              subPath: .env
              readOnly: true

      volumes:
        - name: envfile-existing-secret
          secret:
            secretName: {{ .Values.envFile.existingSecretName }}
        - name: envfile-secret
          secret:
            secretName: "{{ .Values.nameOverride }}-env-secret"
        - name: envfile-config
          configMap:
            name: "{{ .Values.nameOverride }}-env"
